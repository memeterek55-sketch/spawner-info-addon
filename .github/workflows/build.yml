name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download and patch Meteor Client
        run: |
          mkdir -p libs
          METEOR_URL="https://maven.meteordev.org/snapshots/meteordevelopment/meteor-client/1.21.11-SNAPSHOT/meteor-client-1.21.11-20260425.202124-82.jar"
          curl -L -o libs/meteor-client-raw.jar "$METEOR_URL"
          # MANIFEST.MF'den Fabric-Loom-Version satırını sil (Loom version check'i atlamak için)
          mkdir -p /tmp/meteor-extract
          cd /tmp/meteor-extract
          jar xf $GITHUB_WORKSPACE/libs/meteor-client-raw.jar
          if [ -f META-INF/MANIFEST.MF ]; then
            sed -i '/^Fabric-Loom-Version/d' META-INF/MANIFEST.MF
          fi
          jar cf $GITHUB_WORKSPACE/libs/meteor-client-dev.jar .
          echo "Meteor Client patched successfully"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get JAR file
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v dev | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.jar.outputs.jar_path }}
          name: "Spawner Info Addon ${{ github.ref_name }}"
          body: |
            ## Spawner Info Addon ${{ github.ref_name }}

            Meteor Client için spawner bilgi modülü.

            ### Özellikler
            - Spawner türünü ve mesafesini 3D etiketle gösterir
            - Yeni spawner bulunduğunda chat'e mesaj atar
            - Menzil ve renk ayarları

            ### Kurulum
            JAR dosyasını Minecraft `mods` klasörüne at.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR (workflow_dispatch)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: spawner-info-addon
          path: build/libs/*.jar