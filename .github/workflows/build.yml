name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get JAR file
        id: jar
        run: |
          JAR=$(ls build/libs/*-dev.jar 2>/dev/null || ls build/libs/*.jar | grep -v sources | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.jar.outputs.jar_path }}
          name: "Ancient Debris Radar ${{ github.ref_name }}"
          body: |
            ## Ancient Debris Radar ${{ github.ref_name }}

            Meteor Client için Ancient Debris radar modülü.

            ### Özellikler
            - 464.000+ koordinat içinde yakındaki Ancient Debris'i dairesel radar'da gösterir
            - Render mesafesi, daire boyutu, renk ve konum ayarları
            - Sağ tık → ayarlar ile yapılandırılabilir

            ### Kurulum
            JAR dosyasını Minecraft `mods` klasörüne at.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR (workflow_dispatch)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: spawner-info-addon
          path: build/libs/*.jar
